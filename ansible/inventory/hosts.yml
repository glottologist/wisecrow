---
all:
  children:
    wisecrow_node:
      hosts:
        calypso:
          ansible_host: calypso
          ansible_user: jason
          ansible_become_password: "{{ become_pw_calypso }}"
          # Parrot OS — Docker has no parrot apt repo, so point at upstream
          # Debian bookworm. Matches the trading-stack pattern.
          docker_apt_distro_override: debian
          docker_apt_release_override: bookworm
          deploy_dir: /mnt/DATA2/WISECROW
