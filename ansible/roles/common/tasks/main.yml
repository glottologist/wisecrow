---
# Provision Docker engine + docker-compose-plugin + base packages.
# Mirrors the trading-stack `common` role: handles vanilla Debian/Ubuntu
# and lets Parrot/Kali nodes pin to upstream Debian via the
# `docker_apt_distro_override` / `docker_apt_release_override` inventory
# vars.

- name: Resolve Docker apt repo target
  ansible.builtin.set_fact:
    docker_apt_distro: "{{ docker_apt_distro_override | default(ansible_distribution | lower) }}"
    docker_apt_release: "{{ docker_apt_release_override | default(ansible_distribution_release) }}"
  when: ansible_os_family == 'Debian'

- name: Remove pre-existing Docker apt source files (avoid signed-by conflicts)
  ansible.builtin.shell: |
    set -e
    rm -f /etc/apt/sources.list.d/docker.list
    rm -f /etc/apt/sources.list.d/docker-*.list
    if [ -f /etc/apt/sources.list ]; then
      sed -i.bak '/download.docker.com/d' /etc/apt/sources.list
    fi
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Remove deprecated Docker keyring path
  ansible.builtin.file:
    path: /usr/share/keyrings/docker-archive-keyring.gpg
    state: absent
  become: true
  when: ansible_os_family == 'Debian'

- name: Install repo prereqs
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: false
  become: true
  when: ansible_os_family == 'Debian'

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: ansible_os_family == 'Debian'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_apt_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  become: true
  when: ansible_os_family == 'Debian'

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ docker_apt_distro }}
      {{ docker_apt_release }} stable
    state: present
    filename: docker
    update_cache: false
  become: true
  when: ansible_os_family == 'Debian'

- name: Refresh apt cache
  ansible.builtin.shell: apt-get update
  become: true
  changed_when: false
  register: apt_update_result
  failed_when:
    - apt_update_result.rc != 0
    - "'Err:' in apt_update_result.stdout or apt_update_result.stderr | length > 0"
  when: ansible_os_family == 'Debian'

- name: Install docker + compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true
  when: ansible_os_family == 'Debian'

- name: Install other base packages
  ansible.builtin.apt:
    name: "{{ base_packages | default(['rsync', 'curl', 'postgresql-client']) }}"
    state: present
    install_recommends: false
  become: true
  when: ansible_os_family == 'Debian'

- name: Ensure docker service running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Ensure deploy_dir exists and is owned by ansible_user
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Add ansible_user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  become: true
