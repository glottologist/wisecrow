services:
  postgres:
    image: postgres:15-alpine
    container_name: wisecrow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wisecrow}
      POSTGRES_USER: ${POSTGRES_USER:-wisecrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - wisecrow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wisecrow} -d ${POSTGRES_DB:-wisecrow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [wisecrow]

  wisecrow-web:
    image: wisecrow:${WISECROW_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wisecrow-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      WISECROW__DB_ADDRESS: postgres:5432
      WISECROW__DB_NAME: ${POSTGRES_DB:-wisecrow}
      WISECROW__DB_USER: ${POSTGRES_USER:-wisecrow}
      WISECROW__DB_PASSWORD: ${POSTGRES_PASSWORD}
      IP: 0.0.0.0
      PORT: 8080
    ports:
      - "${WISECROW_WEB_BIND:-127.0.0.1}:${WISECROW_WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [wisecrow]

volumes:
  wisecrow-data:

networks:
  wisecrow:
    driver: bridge
